database:
  type: postgres
  host: localhost
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  dbname: SitesIndex
crawler:
  workers: 5
  depth: 1
  delay: "2"
  timeout: 10
  maintenance: 60
api:
  port: 8080
  host: 0.0.0.0
  timeout: 10
selenium:
  - type: chrome
    path: ""
    port: 4444
    headless: true
    host: localhost
network_info:
  dns:
    enabled: true
  whois:
    enabled: true
  httpinfo:
    enabled: true
  sslinfo:
    enabled: true
  geo_localization:
    enabled: false
    path: ""

debug_level: 1

timeseries:
  enabled: false
  defaults:
    failure_policy: log_skip
  cardinality:
    max_series_per_metric: 100000
    max_dimensions: 10
    max_values_per_dimension: 10000
    overflow: drop
  privacy:
    hash_only: false
    store_value_text: false
    max_value_length: 2048
    redact_patterns: []
  metrics: []
